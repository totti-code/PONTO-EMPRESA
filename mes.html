<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meu Mês | Martree</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="top">
  <div class="topInner">
    <div class="brand">
      <img src="assets/logo.png" class="logo" />
      <div class="topTitle">
        <h1>Resumo do Mês</h1>
        <p class="empresa">Martree</p>
      </div>
    </div>

    <button onclick="window.location.href='index.html'" class="btn ghost">
      Voltar
    </button>
  </div>
</header>

<main class="wrap compact">

  <section class="card">
    <h2>Resumo</h2>

    <!-- Filtro de mês -->
    <div class="row" style="grid-template-columns:1fr auto; align-items:end;">
      <div>
        <label>Mês</label>
        <input id="mesRef" type="month" />
      </div>
      <button id="btnAplicarMes" class="btn ghost" type="button">Aplicar</button>
    </div>

    <p><strong>Dias trabalhados:</strong> <span id="dias">-</span></p>
    <p><strong>Total de horas:</strong> <span id="totalHoras">-</span></p>
    <p><strong>Saldo positivo:</strong> <span id="saldoPos">-</span></p>
    <p><strong>Saldo negativo:</strong> <span id="saldoNeg">-</span></p>
    <p><strong>Saldo do mês:</strong> <span id="saldoMes">-</span></p>
    <p><strong>Saldo acumulado:</strong> <span id="saldoAcum">-</span></p>
  </section>

  <section class="card">
    <h2>Detalhamento diário</h2>
    <div class="tableWrap compactTable">
      <table>
        <thead>
          <tr>
            <th>Data</th>
            <th>Cheg</th>
            <th>Saída</th>
            <th>Horas</th>
            <th>Meta</th>
            <th>Saldo</th>
            <th>Acum.</th>
          </tr>
        </thead>
        <tbody id="tbodyMes"></tbody>
      </table>
    </div>
  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  const supabaseUrl = "https://gnmwpudkvhsmtxmypuyt.supabase.co";
  const supabaseKey = "sb_publishable_ewFZG81p4bVSO3Koyhp_LQ_xI4bXPTc";
  window.supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
</script>

<script src="mes.js"></script>
</body>
</html>
