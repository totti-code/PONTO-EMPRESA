<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin | Ponto</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="top">
    <div class="topInner">
      <div class="topTitle">
        <h1>Admin</h1>
        <p class="muted">Cadastros • Controle • Registros</p>
      </div>

      <nav class="menu">
        <a class="menuLink" href="index.html">Registrar ponto</a>
        <a class="menuLink active" href="admin.html">Admin</a>
      </nav>
    </div>
  </header>

  <main class="wrap">

    <section class="card">
      <h2>Acesso</h2>

      <div class="adminAccess">
        <input id="adminPass" type="password" placeholder="Senha do admin" />
        <div class="adminBtns">
          <button id="adminLogin" class="btn">Entrar</button>
          <button id="adminLogout" class="btn ghost" style="display:none;">Sair</button>
        </div>
      </div>

      <p id="adminStatus" class="muted small" style="margin:10px 0 0;"></p>
      <p id="msg" class="msg"></p>
    </section>

    <section class="card">
      <h2>Cadastro de Funcionários (ID → Nome)</h2>

      <div class="adminAddRow">
        <input id="adminId" type="number" placeholder="Número (ex: 1)" inputmode="numeric" />
        <input id="adminNome" type="text" placeholder="Nome (ex: Ismael)" />
        <button id="adminAdd" class="btn">Cadastrar</button>
      </div>

      <div id="adminList" class="adminList"></div>

      <p class="muted small" style="margin-top:10px;">
        Somente IDs cadastrados conseguem bater ponto.
      </p>
    </section>

    <section class="card">
      <div class="row between">
        <div>
          <h2>Registros</h2>
          <p class="muted small">Como admin você pode excluir linhas e limpar tudo.</p>
        </div>

        <div class="actions">
          <button id="export" class="btn ghost">Exportar CSV</button>
          <button id="clear" class="btn ghost">Limpar tudo</button>
        </div>
      </div>

      <div class="row">
        <div>
          <label>Filtrar (Nome ou ID)</label>
          <input id="filter" placeholder="Digite para filtrar..." />
        </div>
        <div>
          <label>Filtrar data</label>
          <input id="filterDate" type="date" />
        </div>
      </div>

      <div class="tableWrap">
        <table>
          <thead>
     <tr>
        <th>Data</th>
        <th>Funcionário</th>
        <th>Chegada</th>
        <th>Início intervalo</th>
        <th>Fim intervalo</th>
        <th>Saída</th>
        <th>Horas</th>
        <th></th>
  </tr>
</thead>
          
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </section>

  </main>

  <footer class="foot">
    <span class="muted small">© <span id="year"></span> Empresa</span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "https://gnmwpudkvhsmtxmypuyt.supabase.co";
    const supabaseKey = "sb_publishable_ewFZG81p4bVSO3Koyhp_LQ_xI4bXPTc";
    window.supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
  </script>

  <script src="script.js"></script>
</body>
</html>
