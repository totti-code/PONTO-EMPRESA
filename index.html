<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ponto | Empresa</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="top">
    <div class="topInner">
      <div>
        <h1>Registro de Ponto</h1>
        <p class="muted">Chegada • Intervalo • Saída</p>
      </div>

      <nav class="menu">
        <a class="menuLink active" href="index.html">Registrar ponto</a>
        <a class="menuLink" href="admin.html">Admin</a>
      </nav>
    </div>
  </header>

  <main class="wrap">

    <section class="card">
      <h2>Bater ponto</h2>

      <label>Funcionário (Número/ID)</label>
      <input id="emp" type="number" placeholder="Ex.: 1" autocomplete="off" inputmode="numeric"/>

      <div class="row">
        <div>
          <label>Data</label>
          <input id="date" type="date"/>
        </div>
        <div>
          <label>Hora</label>
          <input id="time" type="time" step="1"/>
        </div>
      </div>

      <div class="grid">
        <button class="btn" data-type="CHEGADA">Chegada</button>
        <button class="btn" data-type="INI_INTERVALO">Início intervalo</button>
        <button class="btn" data-type="FIM_INTERVALO">Fim intervalo</button>
        <button class="btn danger" data-type="SAIDA">Saída</button>
      </div>

      <p id="msg" class="msg"></p>
      <p class="muted small">Data/hora usam o relógio do computador. Somente o admin pode ajustar.</p>
    </section>

    <section class="card">
      <div class="row between">
        <div>
          <h2>Registros</h2>
          <p class="muted small">Filtre por nome ou ID e exporte para CSV.</p>
        </div>

        <div class="actions">
          <button id="export" class="btn ghost">Exportar CSV</button>
          <button id="clear" class="btn ghost">Limpar tudo</button>
        </div>
      </div>

      <div class="row">
        <div>
          <label>Filtrar (Nome ou ID)</label>
          <input id="filter" placeholder="Digite para filtrar..." />
        </div>
        <div>
          <label>Filtrar data</label>
          <input id="filterDate" type="date" />
        </div>
      </div>

      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th>Data</th>
              <th>Funcionário</th>
              <th>Chegada</th>
              <th>Início intervalo</th>
              <th>Fim intervalo</th>
              <th>Saída</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </section>

  </main>

  <footer class="foot">
    <span class="muted small">© <span id="year"></span> Empresa</span>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const supabaseUrl = "https://gnmwpudkvhsmtxmypuyt.supabase.co";

  window.supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
</script>

<script src="script.js"></script>
</body>
</html>
