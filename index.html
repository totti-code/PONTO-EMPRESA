<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registro de Ponto | Martree</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="top">
    <div class="topInner">

      <!-- ✅ Logo + Título + Empresa -->
      <div class="brand">
        <img src="assets/logo.png" alt="Logo Martree" class="logo" />

        <div class="topTitle">
          <h1>Registro de Ponto</h1>
          <p class="empresa">Martree</p>
          <p class="muted">Chegada • Intervalo • Saída</p>
          </div>
         </div>
      <div style="display:flex; gap:10px;">
    <button onclick="window.location.href='mes.html'" class="btn ghost">
      Meu mês
    </button>
        <button id="btnAdmin" onclick="window.location.href='./admin.html'" class="btn ghost" style="display:none;">
  Admin
</button>

    <button id="btnLogout" class="btn ghost" type="button">
      Sair
    </button>
  </div>
</div>
  </header>

  <main class="wrap compact">

    <section class="card">
      <h2>Bater ponto</h2>
      
      <div class="row">
        <div>
          <label>Data</label>
          <input id="date" type="date" disabled />
        </div>
        <div>
          <label>Hora</label>
          <input id="time" type="time" step="1" disabled />
        </div>
      </div>

      <div class="grid grid-compact">
        <button class="btn" data-type="CHEGADA" type="button">Chegada</button>
        <button class="btn" data-type="INI_INTERVALO" type="button">Início intervalo</button>
        <button class="btn" data-type="FIM_INTERVALO" type="button">Fim intervalo</button>
        <button class="btn danger" data-type="SAIDA" type="button">Saída</button>
      </div>

      <p id="msgIndex" class="msg"></p>
      <p class="muted small">Data/hora usam o relógio do computador.</p>
    </section>

    <section class="card">
      <div class="row between" style="gap:10px;">
        <div>
          <h2 style="margin-bottom:6px;">Registros de hoje</h2>
          <p class="muted small" id="todayLabel" style="margin:0;"></p>
        </div>
        <div class="actions">
          <button id="refreshToday" class="btn ghost" type="button">Atualizar</button>
        </div>
      </div>

      <div class="tableWrap compactTable">
        <table>
          <thead>
            <tr>
              <th>Func.</th>
              <th>Cheg</th>
              <th>Int</th>
              <th>Fim</th>
              <th>Saída</th>
              <th>Hrs</th>
            </tr>
          </thead>
          <tbody id="todayTbody"></tbody>
        </table>
      </div>

      <p class="muted small" style="margin-top:10px;">
        * Mostra apenas o dia atual.
      </p>
    </section>

  </main>

  <footer class="foot">
    <span class="muted small">© <span id="year"></span> Martree</span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "https://gnmwpudkvhsmtxmypuyt.supabase.co";
    const supabaseKey = "sb_publishable_ewFZG81p4bVSO3Koyhp_LQ_xI4bXPTc";
    window.supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
  </script>

  <script src="script.js?v=1"></script>
</body>
</html>
