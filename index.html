<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ponto | Empresa</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top">
    <h1>Registro de Ponto</h1>
    <p class="muted">Chegada • Intervalo • Saída</p>
  </header>

  <main class="wrap">
    <section class="card">
      <h2>Bater ponto</h2>

      <label>Funcionário (Nome ou ID)</label>
      <input id="emp" placeholder="Ex.: Ismael / 123" autocomplete="off"/>

      <div class="row">
        <div>
          <label>Data</label>
          <input id="date" type="date"/>
        </div>
        <div>
          <label>Hora</label>
          <input id="time" type="time" step="1"/>
        </div>
      </div>

      <div class="grid">
        <button class="btn" data-type="CHEGADA">Chegada</button>
        <button class="btn" data-type="INI_INTERVALO">Início intervalo</button>
        <button class="btn" data-type="FIM_INTERVALO">Fim intervalo</button>
        <button class="btn danger" data-type="SAIDA">Saída</button>
      </div>

      <p id="msg" class="msg"></p>
      <p class="muted small">Dica: por padrão, data/hora preenche automaticamente. Você pode ajustar se necessário.</p>
    </section>

    <section class="card">
      <div class="row between">
        <div>
          <h2>Registros</h2>
          <p class="muted small">Filtre por funcionário e exporte para CSV.</p>
        </div>

        <div class="actions">
          <button id="export" class="btn ghost">Exportar CSV</button>
          <button id="clear" class="btn ghost">Limpar tudo</button>
        </div>
      </div>

      <div class="row">
        <div>
          <label>Filtrar funcionário</label>
          <input id="filter" placeholder="Digite para filtrar..." />
        </div>
        <div>
          <label>Filtrar data</label>
          <input id="filterDate" type="date" />
        </div>
      </div>

      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th>Data</th>
              <th>Hora</th>
              <th>Funcionário</th>
              <th>Tipo</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="foot">
    <span class="muted small">© <span id="year"></span> Empresa</span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
